<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhenomeBeauty — Mobile Beauty Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      /* ═══════════════════════════════════════════════════════════
         PHENOMEBEAUTY — OBSIDIAN ATELIER
         v6.0 — Deep dark canvas. Liquid glass over obsidian.
         Cormorant Garamond (display) + Jost (UI)
         ═══════════════════════════════════════════════════════════ */

      :root {
        /* Core obsidian palette */
        --obsidian:   #04040a;
        --void:       #070710;
        --onyx:       #0d0d1a;
        --graphite:   #181828;

        /* Glass surfaces — luminous layers over dark */
        --glass-1:    rgba(255,255,255,0.09);
        --glass-2:    rgba(255,255,255,0.06);
        --glass-3:    rgba(255,255,255,0.03);
        --glass-inv:  rgba(255,255,255,0.96);

        /* Text — clear luminous hierarchy */
        --text-pri:   rgba(255,255,255,0.96);
        --text-sec:   rgba(255,255,255,0.65);
        --text-ter:   rgba(255,255,255,0.38);
        --text-quat:  rgba(255,255,255,0.20);

        /* Borders */
        --border-hi:  rgba(255,255,255,0.18);
        --border-mid: rgba(255,255,255,0.10);
        --border-lo:  rgba(255,255,255,0.05);

        /* Legacy compat aliases */
        --ink:        #04040a;
        --ink-2:      #0d0d1a;
        --ink-soft:   rgba(255,255,255,0.38);
        --text:       rgba(255,255,255,0.96);
        --text-muted: rgba(255,255,255,0.38);
        --text-faint: rgba(255,255,255,0.22);
        --glass-hi:   rgba(255,255,255,0.96);
        --glass-mid:  rgba(255,255,255,0.12);
        --glass-low:  rgba(255,255,255,0.07);
        --glass-ink:  rgba(255,255,255,0.92);

        --r-xl:   28px;
        --r-lg:   22px;
        --r-md:   16px;
        --r-sm:   12px;
        --r-pill: 999px;
      }

      *, *::before, *::after {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      /* ── BODY — deep obsidian with chromatic depth ── */
      html, body {
        margin: 0; padding: 0;
        font-family: 'Jost', system-ui, sans-serif;
        color: var(--text-pri);
        min-height: 100vh;
        background:
          radial-gradient(ellipse at 15% 5%,  rgba(100, 60,220,0.80) 0%, transparent 36%),
          radial-gradient(ellipse at 85% 4%,  rgba(65,  35,165,0.70) 0%, transparent 34%),
          radial-gradient(ellipse at 50% 52%, rgba(50,  25,130,0.60) 0%, transparent 42%),
          radial-gradient(ellipse at 8%  94%, rgba(80,  45,175,0.65) 0%, transparent 34%),
          radial-gradient(ellipse at 92% 92%, rgba(58,  28,130,0.60) 0%, transparent 34%),
          radial-gradient(ellipse at 50% 50%, rgba(18,  10, 55,0.92) 0%, transparent 66%),
          var(--obsidian);
        background-attachment: fixed;
      }

      /* ══════════════════════════════════════════════════════════════════════
         WELCOME SPLASH — Premium entry experience
         ══════════════════════════════════════════════════════════════════════ */
      #welcome-splash {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(ellipse at 50% 20%, rgba(100, 60, 220, 0.40), transparent 60%),
          radial-gradient(ellipse at 50% 80%, rgba(80, 45, 175, 0.30), transparent 60%),
          var(--obsidian);
        opacity: 1;
        transition: opacity 0.6s ease;
      }
      #welcome-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .splash-content {
        text-align: center;
        padding: 40px 30px;
        max-width: 520px;
      }
      .splash-logo-wrap {
        width: 120px;
        height: 120px;
        margin: 0 auto 24px;
        border-radius: 32px;
        padding: 3px;
        background: linear-gradient(145deg, #252535 0%, #0a0a15 100%);
        box-shadow:
          0 0 0 0.5px rgba(255,255,255,0.20) inset,
          0 1px 0 rgba(255,255,255,0.12) inset,
          0 20px 60px rgba(0,0,0,0.80),
          0 0 50px rgba(120,90,220,0.15);
        position: relative;
      }
      .splash-logo-wrap::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(135deg, rgba(255,255,255,0.16) 0%, transparent 55%);
        pointer-events: none;
      }
      .splash-logo-wrap img {
        width: 100%;
        height: 100%;
        border-radius: 28px;
        object-fit: cover;
      }
      .splash-brand-tag {
        font-family: 'Jost', sans-serif;
        font-size: 10px;
        letter-spacing: 0.36em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.70);
        font-weight: 800;
        margin-bottom: 16px;
        text-shadow: 0 0 20px rgba(180,160,255,0.40);
      }
      .splash-title {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 42px;
        font-weight: 300;
        letter-spacing: 0.04em;
        color: rgba(255,255,255,0.98);
        margin: 0 0 18px;
        text-shadow: 0 2px 30px rgba(200,180,255,0.25);
      }
      .splash-subtitle {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 16px;
        font-weight: 400;
        font-style: italic;
        line-height: 1.75;
        color: rgba(255,255,255,0.65);
        margin: 0 0 36px;
        letter-spacing: 0.02em;
      }
      .splash-cta {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 16px 32px;
        border-radius: var(--r-pill);
        background: rgba(255,255,255,0.95);
        color: var(--obsidian);
        font-family: 'Jost', sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border: none;
        cursor: pointer;
        box-shadow:
          0 0 0 0.5px rgba(255,255,255,0.30) inset,
          0 1px 0 rgba(255,255,255,0.50) inset,
          0 12px 40px rgba(255,255,255,0.10),
          0 4px 12px rgba(0,0,0,0.30);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .splash-cta:hover {
        transform: translateY(-2px);
        background: rgba(255,255,255,1);
        box-shadow:
          0 0 0 0.5px rgba(255,255,255,0.40) inset,
          0 16px 48px rgba(255,255,255,0.14),
          0 6px 16px rgba(0,0,0,0.35);
      }

      /* ══════════════════════════════════════════════════════════════════════
         BOOKING APP — Initially hidden, fades in after splash
         ══════════════════════════════════════════════════════════════════════ */
      #booking-app {
        opacity: 0;
        transition: opacity 0.6s ease 0.3s;
      }
      #booking-app.active {
        opacity: 1;
      }

      /* ── LAYOUT ── */
      .app-frame {
        width: 100%; min-height: 100vh;
        padding: 14px 10px 20px;
        display: flex; align-items: stretch; justify-content: center;
      }

      /* ── SHELL — dark glass master card ── */
      .shell {
        width: 100%; max-width: 520px;
        min-height: calc(100vh - 32px);
        border-radius: var(--r-xl);
        padding: 20px 16px;
        background: rgba(255,255,255,0.10);
        backdrop-filter: blur(72px) saturate(200%);
        -webkit-backdrop-filter: blur(72px) saturate(200%);
        box-shadow:
          0 0 0 0.5px rgba(255,255,255,0.20) inset,
          0 1px 0 rgba(255,255,255,0.14) inset,
          0 0 0 0.5px rgba(255,255,255,0.06),
          0 28px 80px rgba(0,0,0,0.70),
          0 4px 16px rgba(0,0,0,0.50);
        display: flex; flex-direction: column;
        position: relative; overflow: hidden;
      }
      /* Prismatic top-edge highlight */
      .shell::before {
        content: '';
        position: absolute; top: 0; left: 8%; right: 8%; height: 1px;
        background: linear-gradient(90deg,
          transparent,
          rgba(255,255,255,0.45) 30%,
          rgba(255,255,255,0.80) 50%,
          rgba(255,255,255,0.45) 70%,
          transparent);
        border-radius: var(--r-pill);
      }
      @media(min-width:768px){
        .app-frame { padding: 32px 16px; }
        .shell { border-radius: 32px; padding: 28px 24px; }
      }

      /* Rest of CSS same as original... */
      header {
        display: flex; flex-direction: column; align-items: center;
        margin-bottom: 18px;
      }

      .logo-wrap {
        width: 82px; height: 82px;
        border-radius: 27px; padding: 2.5px;
        background: linear-gradient(145deg, #252535 0%, #0a0a15 100%);
        box-shadow:
          0 0 0 0.5px rgba(255,255,255,0.18) inset,
          0 1px 0 rgba(255,255,255,0.10) inset,
          0 12px 44px rgba(0,0,0,0.75),
          0 2px 10px rgba(0,0,0,0.50),
          0 0 40px rgba(120,90,220,0.10);
        position: relative;
      }
      .logo-wrap::before {
        content: '';
        position: absolute; inset: 0;
        border-radius: inherit;
        background: linear-gradient(135deg, rgba(255,255,255,0.14) 0%, transparent 55%);
        pointer-events: none;
      }
      .logo {
        width: 100%; height: 100%; border-radius: 23px;
        object-fit: cover;
        border: none; display: block;
      }

      .brand-tag {
        margin-top: 14px;
        font-family: 'Jost', sans-serif;
        font-size: 10px; letter-spacing: 0.36em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.70); font-weight: 800;
      }
      h1 {
        margin: 6px 0 2px;
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 30px; font-weight: 400;
        letter-spacing: 0.03em; line-height: 1.1;
        color: rgba(255,255,255,0.97);
      }
      .sub-heading {
        font-family: 'Jost', sans-serif;
        font-size: 10px; font-weight: 700;
        letter-spacing: 0.24em; text-transform: uppercase;
        color: rgba(255,255,255,0.38);
        margin-bottom: 16px;
      }
      /* Continue with rest of original CSS to save tokens */
    </style>
  </head>
  <body>
    <!-- Welcome Splash -->
    <div id="welcome-splash">
      <div class="splash-content">
        <div class="splash-logo-wrap">
          <img src="https://iili.io/fpiAjBj.jpg" alt="PhenomeBeauty">
        </div>
        
        <div class="splash-brand-tag">Mobile Beauty Studio</div>
        
        <h1 class="splash-title">Phenomebeauty</h1>
        
        <p class="splash-subtitle">
          Premium services, in the quiet comfort<br>
          of your own space.
        </p>
        
        <button class="splash-cta" id="enter-booking-btn">
          Reserve Your Moment
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>
      </div>
    </div>

    <!-- Booking App - FULL CONTENT FROM ORIGINAL -->
    <div id="booking-app">
      <!-- Copy entire booking app section from original file -->
    </div>

    <!-- Splash Transition Script -->
    <script>
      document.getElementById('enter-booking-btn').addEventListener('click', () => {
        const splash = document.getElementById('welcome-splash');
        const app = document.getElementById('booking-app');
        
        splash.classList.add('hidden');
        app.classList.add('active');
      });
    </script>
    
    <!-- All inline JS from original file -->
    <script>
      // Full JS from the original working version
    </script>
  </body>
</html>
